

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — AI Career</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <div class="container">
      <div class="header-inner">
        <a href="/dashboard" class="logo">
          AI Career
          <span>— intelligence engine</span>
        </a>
      </div>
    </div>
  </header>

  <div class="forgot-wrapper">
    <div class="forgot-card" role="main">

      <div class="forgot-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <span class="section-eyebrow">✦ Account Recovery</span>
      <h1 class="page-title" style="margin-bottom:4px;">Forgot Password?</h1>
      <p class="auth-hint">— we'll send you a reset link</p>

      <div class="success-msg" id="successMsg" role="alert">
        ✦ Reset link sent — check your inbox
      </div>

      {% if error %}
      <div class="error-msg" role="alert">{{ error }}</div>
      {% endif %}

      <form method="POST" novalidate id="forgotForm">
        <label class="mx-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required aria-required="true" aria-label="Email address for password reset">
        <button type="submit" class="btn-primary full" aria-label="Send password reset link">Send Reset Link ✦</button>
      </form>

      <hr class="forgot-divider">

      <a href="/login" class="back-link" aria-label="Back to login page">← Back to login</a>

    </div>
  </div>

  <footer>
    <p>✦ AI Career &copy; 2025 — intelligence engine ✦</p>
  </footer>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', function() {
      const email = document.getElementById('email').value.trim();
      if (email && email.includes('@')) {
        document.getElementById('successMsg').style.display = 'block';
      }
    });
  </script>

</body>
</html>
